# t4g.small (2GB RAM) 단일 인스턴스 운영 — db + backend + web 3 컨테이너.
# 메모리 한도:
#   db      = 512M (innodb_buffer_pool_size=256M)
#   backend = 768M (heap 512M + native + metaspace)
#   web     = 64M
#   합계    = 1.34GB. OS/Docker 600M 여유 + 1GB swap 안전망.

services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME:-simple_erp}
      TZ: ${TZ:-Asia/Seoul}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=256M
      - --max-connections=50
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/ladium1/simple-erp-backend:latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mariadb://db:3306/${DB_NAME:-simple_erp}?characterEncoding=UTF-8&serverTimezone=Asia/Seoul
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-10080}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      APP_ADMIN_LOGIN_ID: ${APP_ADMIN_LOGIN_ID}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD}
      DDL_AUTO: ${DDL_AUTO:-update}
      JPA_SHOW_SQL: ${JPA_SHOW_SQL:-false}
      JPA_FORMAT_SQL: ${JPA_FORMAT_SQL:-false}
      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT:-INFO}
      LOG_LEVEL_APP: ${LOG_LEVEL_APP:-INFO}
      TZ: ${TZ:-Asia/Seoul}
    deploy:
      resources:
        limits:
          memory: 768M

  web:
    image: ${WEB_IMAGE:-ghcr.io/ladium1/simple-erp-web:latest}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
      TZ: ${TZ:-Asia/Seoul}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  mariadb_data:
  caddy_data:
  caddy_config:

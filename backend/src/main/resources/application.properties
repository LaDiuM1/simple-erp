spring.application.name=simple-erp

# DB 설정
spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3380/simple_erp?characterEncoding=UTF-8&serverTimezone=Asia/Seoul}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.default_batch_fetch_size=100

# JPA — env 토글 (prod: DDL_AUTO=update, JPA_SHOW_SQL=false, JPA_FORMAT_SQL=false)
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:true}

# 시간대 — JVM TZ 와 무관하게 응답 직렬화는 KST 고정
spring.jackson.time-zone=Asia/Seoul

# 페이징 기본값
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100
spring.data.web.pageable.one-indexed-parameters=false

# JWT 보안 설정
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:10080}

# CORS 설정
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# 관리자 계정 정보
app.admin-login-id=${APP_ADMIN_LOGIN_ID}
app.admin-password=${APP_ADMIN_PASSWORD}

# 로깅 — env 토글 (prod 기본 INFO 권장)
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.io.github.ladium1.erp=${LOG_LEVEL_APP:INFO}

# Actuator — health 엔드포인트만 노출, 상세 정보 비공개
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

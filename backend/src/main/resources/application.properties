spring.application.name=simple-erp

# DB 설정
spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3380/simple_erp?characterEncoding=UTF-8&serverTimezone=Asia/Seoul}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.default_batch_fetch_size=100

# 개발용
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 페이징 기본값
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100
spring.data.web.pageable.one-indexed-parameters=false

# JWT 보안 설정
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:10080}

# CORS 설정
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# 관리자 계정 정보
app.admin-login-id=${APP_ADMIN_LOGIN_ID}
app.admin-password=${APP_ADMIN_PASSWORD}